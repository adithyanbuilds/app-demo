      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap");

      /* ── App Loader ─────────────── */
      #app-loader {
        position: fixed;
        inset: 0;
        background: #0c0c0c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: #fff;
        font-family: "Syne", sans-serif;
        gap: 12px;
      }
      .loader-spin {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #d4a843;
        border-radius: 50%;
        animation: _spin 1s linear infinite;
      }
      @keyframes _spin {
        to { transform: rotate(360deg); }
      }
      /* ── Bear Popup — CoC Style ─────────────── */
      .bear-overlay {
        position: absolute;
        inset: 0;
        z-index: 800;
        pointer-events: none;
        /* NO dark backdrop — bear floats freely */
      }
      .bear-overlay.active { pointer-events: all; }

      /* Bear character — slides in from right, sits mid-screen */
      .bear-char {
        position: absolute;
        right: -8px;
        top: 50%;
        /* start fully off right edge via transform (GPU, no overflow clipping issues) */
        transform: translateX(110%) translateY(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 175px;
        transition: transform 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        cursor: pointer;
        z-index: 2;
      }
      .bear-overlay.active .bear-char {
        transform: translateX(0) translateY(-50%);
      }

      /* CoC speech bubble ABOVE head */
      .bear-coc-bubble {
        position: relative;
        background: #fff;
        border-radius: 14px;
        padding: 10px 12px;
        margin-bottom: 6px;
        width: 170px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 2.5px rgba(0,0,0,0.7);
        text-align: center;
        transform: scale(0.7) translateY(20px);
        opacity: 0;
        transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275) 0.3s,
                    opacity 0.25s ease 0.3s;
      }
      .bear-overlay.active .bear-coc-bubble {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
      /* Triangle pointer pointing DOWN toward bear's head */
      .bear-coc-bubble::after {
        content: "";
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        border: 10px solid transparent;
        border-top-color: #fff;
        border-bottom: 0;
        filter: drop-shadow(0 2px 1px rgba(0,0,0,0.3));
      }
      /* Dark outline for bubble pointer */
      .bear-coc-bubble::before {
        content: "";
        position: absolute;
        bottom: -13px;
        left: 50%;
        transform: translateX(-50%);
        border: 12px solid transparent;
        border-top-color: rgba(0,0,0,0.6);
        border-bottom: 0;
        z-index: -1;
      }

      .bear-coc-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 7.5px;
        font-weight: 900;
        letter-spacing: 1px;
        color: #6e3fff;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .bear-coc-head {
        font-family: "Syne", sans-serif;
        font-size: 14px;
        font-weight: 900;
        color: #111;
        line-height: 1.15;
        margin-bottom: 4px;
      }
      .bear-coc-body {
        font-size: 10px;
        color: #444;
        line-height: 1.45;
        margin-bottom: 8px;
      }
      .bear-coc-btn {
        width: 100%;
        background: linear-gradient(135deg, #6e3fff, #b44fff);
        color: #fff;
        border: none;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 900;
        cursor: pointer;
        font-family: "Plus Jakarta Sans", sans-serif;
        box-shadow: 0 3px 10px rgba(110,63,255,0.4);
      }
      .bear-coc-dismiss {
        font-size: 9px;
        color: #888;
        margin-top: 4px;
        cursor: pointer;
        font-family: "Plus Jakarta Sans", sans-serif;
        background: none;
        border: none;
        width: 100%;
      }

      /* Bear image — mix-blend-mode:screen knocks out black bg */
      .bear-img-wrap {
        position: relative;
        width: 150px;
        height: 150px;
        flex-shrink: 0;
      }
      .bear-img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        mix-blend-mode: screen;
        filter: drop-shadow(0 0 16px rgba(100,180,255,0.5))
                drop-shadow(0 0 6px rgba(255,255,255,0.2));
      }

      @keyframes bearShake {
        0%   { transform: rotate(0deg) scale(1); }
        15%  { transform: rotate(-10deg) scale(1.08); }
        30%  { transform: rotate(9deg) scale(1.08); }
        45%  { transform: rotate(-6deg) scale(1.04); }
        60%  { transform: rotate(5deg) scale(1.02); }
        75%  { transform: rotate(-2deg); }
        100% { transform: rotate(0deg) scale(1); }
      }
      .bear-shake { animation: bearShake 0.65s cubic-bezier(0.36,0.07,0.19,0.97) both; }
    </style>

      // ── Component Loader ──────────────────────────────────────────────────
      async function loadComponents() {
        const components = [
          "home/home.html",
          "ranks/leaderboard.html",
          "learn/learn.html",
          "stats/stats.html",
          "premium/premium.html",
        ];
        const container = document.getElementById("screens-container");
        try {
          const htmlParts = await Promise.all(
            components.map((f) =>
              fetch(f).then((r) => {
                if (!r.ok) throw new Error("Failed: " + f);
                return r.text();
              }),
            ),
          );
          container.innerHTML = htmlParts.join("\n");
          document.getElementById("app-loader").style.display = "none";
          initApp();
        } catch (err) {
          console.error("Component load error:", err);
          document.getElementById("app-loader").innerHTML =
            '<div style="text-align:center;padding:20px;">⚠️ Load error. Please use a local server (e.g. Live Server or python -m http.server).<br><br><small>' +
            err.message + "</small></div>";
        }
      }

              <div style="flex:1;min-width:0;">
                <div style="font-size:13px;font-weight:900;font-family:'Syne',sans-serif;background:${g.namGrad};-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${d.name}</div>
                <div style="border-radius:7px;padding:2px 7px;margin-top:3px;font-size:7.5px;font-weight:800;background:${g.badgeBg};color:${g.badgeCol};border:1px solid ${g.badgeBdr};display:inline-block;">${d.badge}</div>
              </div>
              <div style="flex-shrink:0;text-align:right;">
                <div style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:900;background:${g.xpCol};-webkit-background-clip:text;-webkit-text-fill-color:transparent;">${d.xp}</div>
                <div style="display:flex;gap:1px;justify-content:flex-end;margin-top:3px;">${stars}</div>
              </div>
            </div>
            <div style="margin-top:8px;background:rgba(255,255,255,0.07);height:4px;border-radius:3px;overflow:hidden;">
              <div style="width:${xpPct}%;height:100%;background:${g.barGrad};"></div>
            </div>
          </div>
          <div style="margin-top:5px;font-size:9px;color:var(--mut);">${d.taunt}</div>`;
          showSlide("sl-podium");
        };

        window.renderShoutout = function (idx) {
          const d = shoutoutData[idx];
          const el = document.getElementById("sl-shoutout");
          if (!el) return;
          el.innerHTML = `<div style="padding:8px;">
            <div style="font-size:10px;font-weight:800;color:var(--acc2);margin-bottom:6px;font-family:'JetBrains Mono',monospace;letter-spacing:0.8px;">📣 HONOURABLE MENTIONS</div>
            <div style="display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--b);padding:10px;border-radius:12px;">
              <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,${d.color},#000);display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-family:'Syne',sans-serif;">${d.av}</div>
              <div>
                <div style="font-size:12px;font-weight:800;color:var(--txt);font-family:'Syne',sans-serif;">${d.name}</div>
                <div style="font-size:10px;color:var(--mut);font-family:'JetBrains Mono',monospace;">${d.xp} XP</div>
              </div>
            </div>
            <div style="margin-top:8px;font-size:10px;line-height:1.4;color:var(--txt);">${d.msg}</div>
          </div>`;
          showSlide("sl-shoutout");
        };

        window.renderBattle = function () {
          showSlide("sl-battle");
        };

        // ── TV Quiz: simple flash card — question then answer, no timer UI ──
        window.renderTVQuiz = function () {
          const q = getRandomTvQuestion(); // from quiz-engine.js
          const el = document.getElementById("sl-quiz");
          if (!el || !q) return;

          el.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <div style="font-size:10px;font-weight:800;color:var(--acc2);font-family:'JetBrains Mono',monospace;letter-spacing:1px;">
                📺 GK FLASH CARD
              </div>
              <div style="font-size:9px;color:var(--mut);font-family:'JetBrains Mono',monospace;">
                ${q.tag || "UPSC PREP"}
              </div>
            </div>
            <div style="font-family:'Syne',sans-serif;font-size:14px;font-weight:800;line-height:1.35;color:var(--txt);margin-bottom:12px;">
              ${q.question}
            </div>
            <div style="
              background:var(--b);
              border:1px solid var(--b2);
              padding:10px 12px;
              border-radius:10px;
              font-family:'JetBrains Mono',monospace;
              font-size:13px;
              font-weight:800;
              color:var(--acc);
            ">
              ✅ ${q.answer}
            </div>
          `;

          showSlide("sl-quiz");
        };

        // ── Tip slide: toggles between tip content and honor list ────────
        window.renderTip = function (idx) {
          const t = tips[idx];
          const el = document.getElementById("sl3");
          if (!el) return;
          // Show tip wrapper, hide honor list
          const tipWrap    = document.getElementById("tipWrap");
          const honorWrap  = document.getElementById("honorListWrap");
          if (tipWrap)   tipWrap.style.display   = "flex";
          if (honorWrap) honorWrap.style.display  = "none";
          document.getElementById("tipIc").textContent    = t.ic;
          document.getElementById("tipTitle").textContent  = t.title;
          document.getElementById("tipBody").textContent   = t.body;
          document.getElementById("tipCta").textContent    = t.cta;
          showSlide("sl3");
        };

        window.renderPrem = function (idx) {
          const p = premFeats[idx];
          const el = document.getElementById("sl4");
          if (!el) return;
          document.getElementById("premIc").textContent      = p.ic;
          document.getElementById("premTitleTv").textContent = p.title;
          document.getElementById("premBodyTv").textContent  = p.body;
          showSlide("sl4");
        };

        window.showSlide = function (id) {
          ["sl-bn","sl-podium","sl-shoutout","sl-battle","sl-quiz","sl3","sl4"].forEach((sid) => {
            const el = document.getElementById(sid);
            if (!el) return;
            if (sid === id) {
              el.classList.remove("exit");
              el.classList.add("active");
              // When honor-mentions slide becomes active (not via renderTip),
              // restore honor list visibility
              if (sid === "sl3") {
                const tipWrap   = document.getElementById("tipWrap");
                const honorWrap = document.getElementById("honorListWrap");
                if (tipWrap   && tipWrap.style.display   === "flex") { /* leave tip showing */ }
              }
            } else if (el.classList.contains("active")) {
              el.classList.remove("active");
              el.classList.add("exit");
              // When sl3 exits, reset it back to honor list for next time
              if (sid === "sl3") {
                const tipWrap   = document.getElementById("tipWrap");
                const honorWrap = document.getElementById("honorListWrap");
                if (tipWrap)   tipWrap.style.display   = "none";
                if (honorWrap) honorWrap.style.display  = "flex";
              }
              setTimeout(() => el.classList.remove("exit"), 500);
            }
          });
          const chEl = document.getElementById("tvChNum");
          if (chEl)
            chEl.textContent =
              "CH·" + String((stepIdx % slides.length) + 1).padStart(2, "0");
        };

        window.runStep = function () {
          const step = slides[stepIdx % slides.length];
          renderStep(step);
          tvTimer = setTimeout(() => {
            stepIdx = (stepIdx + 1) % slides.length;
            runStep();
          }, step.ms);
        };

        // ── Tab / Navigation ─────────────────────────────────────────────
        window.switchTab = function (id) {
          document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
          document.querySelectorAll(".nb").forEach((b) => b.classList.remove("active"));
          const screen = document.getElementById(id);
          if (screen) screen.classList.add("active");
          const nav = document.getElementById("nav-" + id);
          if (nav) nav.classList.add("active");
          if (id === "stats") _animateStats();
          if (id === "home")  _animateHome();
          if (id === "learn") {
            if (window.buildSubjectStudyGrid) buildSubjectStudyGrid();
          }
        };

        function _animateHome() {
          setTimeout(() => {
            const f = document.getElementById("hXpFill");
            if (f) f.style.width = "65%";
          }, 200);
        }

        function _animateStats() {
          setTimeout(() => {
            const f = document.getElementById("stLvF");
            if (f) f.style.width = "65%";
          }, 100);
          _buildHM();
        }

        function _buildHM() {
          const g = document.getElementById("hmG");
          if (!g || g.children.length > 0) return;
          [
            0,0,1,2,3,4,2,1,0,1,3,4,2,1,0,0,2,3,4,3,2,1,0,
            1,2,3,4,3,2,1,0,2,3,4,3,2,1,2,3,4,4,3,2,1,0,1,
            2,3,4,3,2,1,2,3,4,3,
          ].forEach((v) => {
            const c = document.createElement("div");
            c.className = "hmc" + (v > 0 ? " h" + v : "");
            g.appendChild(c);
          });
        }

        // ── Theme picker ──────────────────────────────────────────────────
        window.pickTheme = function (name, card) {
          document.body.setAttribute("data-theme", name);
          localStorage.setItem("upsc_theme", name);
          document.querySelectorAll(".thc").forEach((c) => c.classList.remove("active"));
          if (card) card.classList.add("active");
        };

        // ── Price toggle ──────────────────────────────────────────────────
        window.setPrice = function (period, btn) {
          document.querySelectorAll(".ptb").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const amt   = document.getElementById("pAmt");
          const cross = document.getElementById("pCross");
          if (period === "monthly") {
            if (amt)   amt.innerHTML      = "₹99<span>/mo</span>";
            if (cross) cross.textContent  = "₹149";
          } else {
            if (amt)   amt.innerHTML      = "₹499<span>/yr</span>";
            if (cross) cross.textContent  = "₹999";
          }
        };

        window.doBuy = function (plan, price) {
          toast("🛒 Opening checkout for " + plan + " at " + price);
        };

        // ── Bear Popup ────────────────────────────────────────────────────
        const _bearMsgs = {
          themes: {
            tag:  "🎨 PREMIUM FEATURE",
            head: "STAY OUT OF MY DEN!",
            body: "10 stunning themes are hibernating behind a paywall. Wake them up with Pro — the bear demands it."
          },
          adfree: {
            tag:  "🚫 PREMIUM FEATURE",
            head: "ADS? REALLY?!",
            body: "You're sitting through ads while I'm sitting here FURIOUS. Go ad-free. The bear has spoken."
          },
          affairs: {
            tag:  "📰 PREMIUM FEATURE",
            head: "NO NEWS FOR YOU!",
            body: "Daily current affairs are gated. The bear reads everything. You read nothing. Fix that with Pro."
          },
          quiz: {
            tag:  "⚡ PREMIUM FEATURE",
            head: "YOU CAN'T SIT WITH US!",
            body: "Pro quizzes, survival mode and weekly battles are locked. The bear challenges you to unlock them."
          }
        };

        window.showBearPopup = function(feature) {
          const msg = _bearMsgs[feature] || _bearMsgs.themes;
          document.getElementById("bearTag").textContent  = msg.tag;
          document.getElementById("bearHead").textContent = msg.head;
          document.getElementById("bearBody").textContent = msg.body;

          const overlay = document.getElementById("bearOverlay");
          const imgWrap = document.getElementById("bearImgWrap");

          overlay.classList.add("active");

          // Shake bear after it slides in
          setTimeout(() => {
            imgWrap.classList.add("bear-shake");
            setTimeout(() => imgWrap.classList.remove("bear-shake"), 700);
          }, 480);
        };

        window.closeBearPopup = function() {
          document.getElementById("bearOverlay").classList.remove("active");
        };

        // ── Toast & Confetti ──────────────────────────────────────────────
        window.toast = function (msg) {
          const t = document.getElementById("xpToast");
          if (!t) return;
          t.textContent = msg;
          t.classList.add("show");
          setTimeout(() => t.classList.remove("show"), 2200);
        };

        window.confetti = function () {
          const cw = document.getElementById("confW");
          if (!cw) return;
          for (let i = 0; i < 30; i++) {
            const c = document.createElement("div");
            c.className = "conf-p";
            c.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*40+10}%;background:hsl(${Math.random()*360},80%,60%);animation-duration:${0.8+Math.random()*0.8}s;animation-delay:${Math.random()*0.3}s`;
            cw.appendChild(c);
            setTimeout(() => c.remove(), 1800);
          }
        };

        // ── Live clock ────────────────────────────────────────────────────
        setInterval(() => {
          const el = document.getElementById("tvClock");
          if (!el) return;
          const n = new Date();
          let h = n.getHours();
          const ampm = h >= 12 ? 'PM' : 'AM';
          h = h % 12;
          h = h ? h : 12;
          el.textContent =
            String(h).padStart(2, "0") + ":" +
            String(n.getMinutes()).padStart(2, "0") + " " + ampm;
        }, 1000);

        // ── Kick off ──────────────────────────────────────────────────────
        // Restore last picked theme
        const savedTheme = localStorage.getItem("upsc_theme");
        if (savedTheme) {
          document.body.setAttribute("data-theme", savedTheme);
          const savedCard = document.getElementById("th-" + savedTheme);
          if (savedCard) {
            document.querySelectorAll(".thc").forEach((c) => c.classList.remove("active"));
            savedCard.classList.add("active");
          }
        }
        _animateHome();
        _buildHM();
        if (window.buildSubjectStudyGrid) buildSubjectStudyGrid();
        switchTab("home");
        runStep();
      }

      // ── Viewport Height Fix ───────────────────────────────────────────────
      function fixHeight() {
        const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const w = window.visualViewport ? window.visualViewport.width  : window.innerWidth;
        document.documentElement.style.setProperty("--app-h", h + "px");
        document.documentElement.style.setProperty("--vph",   h + "px");
        const phone = document.getElementById("app");
        if (!phone) return;
        if (w <= 480) {
          phone.style.cssText = `width:${w}px;height:${h}px;border-radius:0`;
        } else {
          phone.style.cssText = "";
        }
      }
      fixHeight();
      window.addEventListener("resize", fixHeight);
      window.addEventListener("orientationchange", () => setTimeout(fixHeight, 150));
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fixHeight);
        window.visualViewport.addEventListener("scroll", fixHeight);
      }

      window.addEventListener("load", loadComponents);
    </script>

    <!-- ════ WELCOME BEAR PEEK ════════════════════════════════════════════════ -->
    <script src="bear/welcome-bear.js"></script>
    <script src="bear/jump-bear.js"></script>
    <script src="bear/sad-bear.js"></script>
  </body>
