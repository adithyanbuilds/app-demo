      /* ── App Loader ─────────────── */
      #app-loader {
        position: fixed;
        inset: 0;
        background: #0c0c0c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: #fff;
        font-family: "Syne", sans-serif;
        gap: 12px;
      }
      .loader-spin {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top-color: #d4a843;
        border-radius: 50%;
        animation: _spin 1s linear infinite;
      }
      @keyframes _spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <script>
      "use strict";

      // ── Component Loader: fetches HTML from subfolders ────────────────────────
      async function loadComponents() {
        const components = [
          "home/home.html",
          "ranks/leaderboard.html",
          "learn/learn.html",
          "stats/stats.html",
          "premium/premium.html",
        ];
        const container = document.getElementById("screens-container");
        try {
          const htmlParts = await Promise.all(
            components.map((f) =>
              fetch(f).then((r) => {
                if (!r.ok) throw new Error("Failed: " + f);
                return r.text();
              }),
            ),
          );
          container.innerHTML = htmlParts.join("\n");
          document.getElementById("app-loader").style.display = "none";
          initApp();
        } catch (err) {
          console.error("Component load error:", err);
          document.getElementById("app-loader").innerHTML =
            '<div style="text-align:center;padding:20px;">⚠️ Load error. Please use a local server (e.g. Live Server or python -m http.server).<br><br><small>' +
            err.message +
            "</small></div>";
        }
      }

          if (step.type === "bn") renderBN(step.idx);
          if (step.type === "podium") renderPodium(step.idx);
          if (step.type === "shoutout") renderShoutout(step.idx);
          if (step.type === "battle") renderBattle();
          if (step.type === "quiz") renderTVQuiz();
          if (step.type === "tip") renderTip(step.idx % tips.length);
          if (step.type === "prem") renderPrem(step.idx % premFeats.length);
        };

        window.renderBN = function (idx) {
          const d = bnData[idx % bnData.length];
          const el = document.getElementById("sl-bn");
          if (!el) return;
          el.querySelector("#bnHead").innerHTML = d.head;
          el.querySelector("#bnSub").textContent = d.sub;
          showSlide("sl-bn");
        };

        window.renderPodium = function (idx) {

          clearInterval(tvQuizTimer);
          const tvQs = getTvQs(); // from quiz-engine.js — reads from UPSC_QUIZ_BANKS
          const q = tvQs[tvQIdx % tvQs.length];
          const el = document.getElementById("sl-quiz");
          if (!el || !q) return;
          el.innerHTML = `
          <div class="qtv-header">
            <div class="qtv-mode"><div class="qtv-mode-dot"></div>GK QUIZ · LIVE</div>
            <div class="qtv-countdown" id="tvCountdownWrap">
              <svg viewBox="0 0 30 30" width="30" height="30">
                <circle class="qtv-countdown-track" cx="15" cy="15" r="12"/>
                <circle class="qtv-countdown-fill" id="tvCountdownArc" cx="15" cy="15" r="12" stroke="#00ff88" stroke-dasharray="75.4" stroke-dashoffset="0"/>
              </svg>
              <div class="qtv-countdown-num" id="tvCountdownNum">22</div>
            </div>
          </div>
          <div class="qtv-q">${q.q}</div>
          <div class="qtv-opts" id="tvQOpts">${q.opts.map((o, i) => `<div class="qtv-opt" data-i="${i}"><span class="qtv-key">${String.fromCharCode(65 + i)}</span>${o}</div>`).join("")}</div>
          <div id="tvQExp"></div>
          <div class="qtv-xp-burst" id="tvXpBurst">+25 XP ⚡</div>`;
          el.querySelectorAll(".qtv-opt").forEach((opt) => {
            opt.onclick = () =>
              _revealTVAnswer(parseInt(opt.dataset.i), q.ans, q);
          });
          tvQSecs = TV_Q_SECS;
          _updateTVCountdown();
          const bar = document.getElementById("tvTimerBar");
          if (bar) {
            bar.style.width = "100%";
            bar.style.background = "linear-gradient(90deg,#00ff88,#00d4ff)";
          }
          tvQuizTimer = setInterval(() => {
            tvQSecs--;
            _updateTVCountdown();
            const pct = (tvQSecs / TV_Q_SECS) * 100;
            if (bar) {
              bar.style.width = Math.max(0, pct) + "%";
              if (tvQSecs <= 5)
                bar.style.background = "linear-gradient(90deg,#ff4444,#ff8800)";
              else if (tvQSecs <= 9)
                bar.style.background = "linear-gradient(90deg,#ffd700,#ff9500)";
            }
            if (tvQSecs <= 0) {
              clearInterval(tvQuizTimer);
              _revealTVAnswer(-1, q.ans, q);
              tvQIdx++;
            }
          }, 1000);
          showSlide("sl-quiz");
        };

        function _updateTVCountdown() {
          const num = document.getElementById("tvCountdownNum");
          const arc = document.getElementById("tvCountdownArc");
          if (!num || !arc) return;
          arc.style.strokeDashoffset = 75.4 * (1 - tvQSecs / TV_Q_SECS);
          arc.style.stroke =
            tvQSecs <= 5 ? "#ff4444" : tvQSecs <= 9 ? "#ffd700" : "#00ff88";
          num.textContent = tvQSecs;
          num.style.color =
            tvQSecs <= 5 ? "#ff6666" : tvQSecs <= 9 ? "#ffd700" : "#fff";
        }

        function _revealTVAnswer(chosen, correct, q) {
          clearInterval(tvQuizTimer);
          document.querySelectorAll(".qtv-opt").forEach((el, i) => {
            if (i === correct) el.classList.add("correct");
            else if (i === chosen) el.classList.add("wrong");
          });
          const ok = chosen === correct;
          const burst = document.getElementById("tvXpBurst");
          if (burst) {
            burst.textContent = ok ? "+25 XP ⚡" : "0 XP";
            burst.style.color = ok ? "#00ff88" : "#ff5555";
            burst.className = "qtv-xp-burst pop";
          }
          const expEl = document.getElementById("tvQExp");
          if (expEl && q) {
            const verdict = ok
              ? "✅ Correct!"
              : chosen === -1
                ? "⏱ Time is up!"
                : "❌ Not quite!";
            expEl.innerHTML = `<div class="qtv-exp-bar ${ok ? "qtv-exp-win" : "qtv-exp-lose"}"><div class="qtv-exp-verdict">${verdict}</div><div class="qtv-exp-msg">${ok ? q.win || "" : q.lose || ""}</div><div class="qtv-exp-fact">💡 ${q.exp || ""}</div></div>`;
          }
        }

        window.renderTip = function (idx) {
          const t = tips[idx];
          const el = document.getElementById("sl3");
          if (!el) return;
          el.querySelector("#tipIc").textContent = t.ic;
          el.querySelector("#tipTitle").textContent = t.title;
          el.querySelector("#tipBody").textContent = t.body;
          el.querySelector("#tipCta").textContent = t.cta;
          showSlide("sl3");
        };

        window.renderPrem = function (idx) {
          const p = premFeats[idx];
          const el = document.getElementById("sl4");
          if (!el) return;
          el.querySelector("#premIc").textContent = p.ic;
          el.querySelector("#premTitleTv").textContent = p.title;
          el.querySelector("#premBodyTv").textContent = p.body;
          showSlide("sl4");
        };

        window.showSlide = function (id) {
          [
            "sl-bn",
            "sl-podium",
            "sl-shoutout",
            "sl-battle",
            "sl-quiz",
            "sl3",
            "sl4",
          ].forEach((sid) => {
            const el = document.getElementById(sid);
            if (!el) return;
            if (sid === id) {
              el.classList.remove("exit");
              el.classList.add("active");
            } else if (el.classList.contains("active")) {
              el.classList.remove("active");
              el.classList.add("exit");
              setTimeout(() => el.classList.remove("exit"), 500);
            }
          });
          const chEl = document.getElementById("tvChNum");
          if (chEl)
            chEl.textContent =
              "CH·" + String((stepIdx % slides.length) + 1).padStart(2, "0");
        };

        window.runStep = function () {
          const step = slides[stepIdx % slides.length];
          renderStep(step);
          tvTimer = setTimeout(() => {
            stepIdx = (stepIdx + 1) % slides.length;
            runStep();
          }, step.ms);
        };

        // ── Tab / Navigation ─────────────────────────────────────────────────
        window.switchTab = function (id) {
          document
            .querySelectorAll(".screen")
            .forEach((s) => s.classList.remove("active"));
          document
            .querySelectorAll(".nb")
            .forEach((b) => b.classList.remove("active"));
          const screen = document.getElementById(id);
          if (screen) screen.classList.add("active");
          const nav = document.getElementById("nav-" + id);
          if (nav) nav.classList.add("active");
          if (id === "stats") _animateStats();
          if (id === "home") _animateHome();
          if (id === "learn") {
            if (window.buildSubjectStudyGrid) buildSubjectStudyGrid();
          }
        };

        function _animateHome() {
          setTimeout(() => {
            const f = document.getElementById("hXpFill");
            if (f) f.style.width = "65%";
          }, 200);
        }

        function _animateStats() {
          setTimeout(() => {
            const f = document.getElementById("stLvF");
            if (f) f.style.width = "65%";
          }, 100);
          _buildHM();
        }

        function _buildHM() {
          const g = document.getElementById("hmG");
          if (!g || g.children.length > 0) return;
          [
            0, 0, 1, 2, 3, 4, 2, 1, 0, 1, 3, 4, 2, 1, 0, 0, 2, 3, 4, 3, 2, 1, 0,
            1, 2, 3, 4, 3, 2, 1, 0, 2, 3, 4, 3, 2, 1, 2, 3, 4, 4, 3, 2, 1, 0, 1,
            2, 3, 4, 3, 2, 1, 2, 3, 4, 3,
          ].forEach((v) => {
            const c = document.createElement("div");
            c.className = "hmc" + (v > 0 ? " h" + v : "");
            g.appendChild(c);
          });
        }

        // ── Theme picker ──────────────────────────────────────────────────────
        window.pickTheme = function (name, card) {
          document.body.setAttribute("data-theme", name);
          document
            .querySelectorAll(".thc")
            .forEach((c) => c.classList.remove("active"));
          if (card) card.classList.add("active");
        };

        // ── Price toggle ──────────────────────────────────────────────────────
        window.setPrice = function (period, btn) {
          document
            .querySelectorAll(".ptb")
            .forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          const amt = document.getElementById("pAmt");
          const cross = document.getElementById("pCross");
          if (period === "monthly") {
            if (amt) amt.innerHTML = "₹99<span>/mo</span>";
            if (cross) cross.textContent = "₹149";
          } else {
            if (amt) amt.innerHTML = "₹499<span>/yr</span>";
            if (cross) cross.textContent = "₹999";
          }
        };

        window.doBuy = function (plan, price) {
          toast("🛒 Opening checkout for " + plan + " at " + price);
        };

        // ── Toast & Confetti helpers ──────────────────────────────────────────
        window.toast = function (msg) {
          const t = document.getElementById("xpToast");
          if (!t) return;
          t.textContent = msg;
          t.classList.add("show");
          setTimeout(() => t.classList.remove("show"), 2200);
        };

        window.confetti = function () {
          const cw = document.getElementById("confW");
          if (!cw) return;
          for (let i = 0; i < 30; i++) {
            const c = document.createElement("div");
            c.className = "conf-p";
            c.style.cssText = `left:${Math.random() * 100}%;top:${Math.random() * 40 + 10}%;background:hsl(${Math.random() * 360},80%,60%);animation-duration:${0.8 + Math.random() * 0.8}s;animation-delay:${Math.random() * 0.3}s`;
            cw.appendChild(c);
            setTimeout(() => c.remove(), 1800);
          }
        };

        // ── Live clock ────────────────────────────────────────────────────────
        setInterval(() => {
          const el = document.getElementById("tvClock");
          if (!el) return;
          const n = new Date();
          el.textContent =
            String(n.getHours()).padStart(2, "0") +
            ":" +
            String(n.getMinutes()).padStart(2, "0") +
            ":" +
            String(n.getSeconds()).padStart(2, "0");
        }, 1000);

        // ── Kick off! ─────────────────────────────────────────────────────────
        _animateHome();
        _buildHM();
        buildSubjectStudyGrid(); // from subject-engine.js — safe even if grid not visible yet

        // Switch to home and start TV loop
        switchTab("home");
        runStep();
      }

      // ── Viewport Height Fix ────────────────────────────────────────────────────
      function fixHeight() {
        const h = window.visualViewport
          ? window.visualViewport.height
          : window.innerHeight;
        const w = window.visualViewport
          ? window.visualViewport.width
          : window.innerWidth;
        document.documentElement.style.setProperty("--app-h", h + "px");
        document.documentElement.style.setProperty("--vph", h + "px");
        const phone = document.getElementById("app");
        if (!phone) return;
        if (w <= 480) {
          phone.style.cssText = `width:${w}px;height:${h}px;border-radius:0`;
        } else {
          phone.style.cssText = "";
        }
      }
      fixHeight();
      window.addEventListener("resize", fixHeight);
      window.addEventListener("orientationchange", () =>
        setTimeout(fixHeight, 150),
      );
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fixHeight);
        window.visualViewport.addEventListener("scroll", fixHeight);
      }

      // Start everything on load
      window.addEventListener("load", loadComponents);
    </script>
  </body>
</html>
